<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>순발력 측정! 두더지 잡기</title>
    <style>
        :root {
            --grass-color: #7cb342;
            --soil-color: #5d4037;
            --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--grass-color);
            background-image: radial-gradient(#8bc34a 15%, transparent 16%);
            background-size: 40px 40px;
            font-family: var(--font-main);
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        #game-area {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* 헤더 UI */
        .ui-header {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .status-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .mole-hole {
            width: 40px;
            height: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            position: relative;
        }

        .mole-hole.filled::after {
            content: '🐾';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }

        /* 두더지 과녁 */
        #target-mole {
            position: absolute;
            width: 120px;
            height: 120px;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            z-index: 5;
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.3));
            animation: popUp 0.1s ease-out;
        }

        @keyframes popUp {
            from {
                transform: scale(0.5) translateY(50px);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* 결과 창 및 대시보드 */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            z-index: 100;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .modal h1 {
            color: var(--soil-color);
            margin-top: 0;
        }

        .score-avg {
            font-size: 3rem;
            font-weight: 900;
            color: #f44336;
            margin: 10px 0;
        }

        .dashboard {
            margin: 20px 0;
            background: #f5f5f5;
            border-radius: 15px;
            padding: 15px;
            text-align: left;
        }

        .dashboard-title {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background: var(--grass-color);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-action:active {
            transform: scale(0.95);
        }

        /* 경고 효과 */
        .foul-state {
            animation: shake 0.4s;
            background-color: #ff5252 !important;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }
    </style>
</head>

<body onclick="handleBackgroundClick()">

    <div id="game-area">
        <div class="ui-header">
            <div id="status" class="status-text">화면을 클릭하여 시작! 🔨</div>
            <div class="progress-bar" id="progress-bar">
                <div class="mole-hole"></div>
                <div class="mole-hole"></div>
                <div class="mole-hole) "></div>
                <div class="mole-hole"></div>
                <div class="mole-hole"></div>
            </div>
        </div>

        <!-- 두더지 과녁 -->
        <div id="target-mole" onclick="handleMoleClick(event)">🐹</div>

        <!-- 결과 모달 -->
        <div id="result-modal" class="modal">
            <h2 id="grade-text">평가 중...</h2>
            <div id="avg-result" class="score-avg">0ms</div>
            <p id="feedback-text" style="color: #666;"></p>

            <div class="dashboard">
                <div class="dashboard-title">최근 기록 대시보드 (최근 5회 평균)</div>
                <div id="history-list">
                    <p style="text-align: center; color: #999;">기록이 없습니다.</p>
                </div>
            </div>

            <button class="btn-action" onclick="resetGame()">다시 도전하기</button>
        </div>
    </div>

    <script>
        let gameState = 'READY'; // READY, WAITING, ACTIVE, END
        let round = 0;
        let startTime = 0;
        let roundRecords = [];
        let gameHistory = JSON.parse(localStorage.getItem('moleGameHistory') || '[]');
        let waitTimer = null;

        const statusEl = document.getElementById('status');
        const moleEl = document.getElementById('target-mole');
        const holes = document.getElementById('progress-bar').children;
        const modalEl = document.getElementById('result-modal');
        const historyListEl = document.getElementById('history-list');

        // 1. 초기 세팅: 대시보드 업데이트
        updateDashboard();

        // 2. 배경 클릭 처리 (시작 또는 반칙)
        function handleBackgroundClick() {
            if (gameState === 'READY') {
                startNewGame();
            } else if (gameState === 'WAITING') {
                triggerFoul();
            }
        }

        // 3. 게임 시작
        function startNewGame() {
            round = 0;
            roundRecords = [];
            for (let hole of holes) hole.classList.remove('filled');
            modalEl.style.display = 'none';
            nextRound();
        }

        // 4. 다음 라운드 준비
        function nextRound() {
            if (round >= 5) {
                finishGame();
                return;
            }

            gameState = 'WAITING';
            statusEl.innerText = "집중하세요... 두더지가 나옵니다! 🌱";
            statusEl.style.color = "white";
            moleEl.style.display = 'none';

            const delay = Math.random() * 4000 + 1000; // 1~5초 랜덤
            waitTimer = setTimeout(showMole, delay);
        }

        // 5. 두더지 출현
        function showMole() {
            gameState = 'ACTIVE';
            statusEl.innerText = "지금이다! 잡으세요!! 🔨";

            // 랜덤 좌표 (화면 가장자리 여백 고려)
            const x = Math.random() * (window.innerWidth - 150) + 75;
            const y = Math.random() * (window.innerHeight - 250) + 150;

            moleEl.style.left = `${x}px`;
            moleEl.style.top = `${y}px`;
            moleEl.style.display = 'flex';

            startTime = performance.now();
        }

        // 6. 두더지 클릭 성공
        function handleMoleClick(e) {
            e.stopPropagation();
            if (gameState !== 'ACTIVE') return;

            const endTime = performance.now();
            const reactionTime = Math.round(endTime - startTime);
            roundRecords.push(reactionTime);

            holes[round].classList.add('filled');
            round++;

            statusEl.innerText = `${reactionTime}ms! 명중!`;
            gameState = 'READY_NEXT'; // 잠시 대기

            setTimeout(nextRound, 800);
        }

        // 7. 반칙 처리
        function triggerFoul() {
            clearTimeout(waitTimer);
            gameState = 'FOUL';
            statusEl.innerText = "너무 빨라요! 반칙! 🚩";
            statusEl.style.color = "#ffeb3b";
            document.body.classList.add('foul-state');

            setTimeout(() => {
                document.body.classList.remove('foul-state');
                nextRound(); // 해당 회차 재시작
            }, 1000);
        }

        // 8. 게임 종료 및 기록 저장
        function finishGame() {
            gameState = 'END';
            const avg = Math.round(roundRecords.reduce((a, b) => a + b) / 5);

            // 로컬스토리지에 기록 저장
            const now = new Date();
            const timestamp = `${now.getMonth() + 1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
            gameHistory.unshift({ date: timestamp, score: avg });
            if (gameHistory.length > 5) gameHistory.pop();
            localStorage.setItem('moleGameHistory', JSON.stringify(gameHistory));

            // 등급 산출
            let grade = "";
            let feedback = "";
            if (avg < 200) { grade = "전설의 스나이퍼 ⚡"; feedback = "인간의 한계를 넘어선 반응속도입니다!"; }
            else if (avg < 270) { grade = "숙련된 사냥꾼 🏹"; feedback = "아주 뛰어난 순발력을 가지고 계시네요!"; }
            else if (avg < 350) { grade = "평범한 농부 👨‍🌾"; feedback = "조금 더 집중하면 두더지를 다 잡을 수 있어요."; }
            else { grade = "졸고 있는 두더지 💤"; feedback = "혹시 같이 구멍 속에 계셨나요? 다시 해보세요!"; }

            document.getElementById('grade-text').innerText = grade;
            document.getElementById('avg-result').innerText = `${avg}ms`;
            document.getElementById('feedback-text').innerText = feedback;

            updateDashboard();
            modalEl.style.display = 'block';
        }

        // 9. 대시보드 업데이트 UI
        function updateDashboard() {
            if (gameHistory.length === 0) return;

            historyListEl.innerHTML = gameHistory.map((item, idx) => `
            <div class="history-item">
                <span>${idx + 1}. ${item.date}</span>
                <span style="font-weight:bold; color:var(--grass-color)">${item.score}ms</span>
            </div>
        `).join('');
        }

        // 다시하기
        function resetGame() {
            startNewGame();
        }
    </script>

</body>

</html>
